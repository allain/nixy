$mod = SUPER
source = ~/.config/hypr/monitors.conf
env = XCURSOR_SIZE,24
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = walker --gapplication-service
exec-once = swww-daemon &
exec-once = sleep 1 && ~/.config/hypr/gradient-wallpaper.sh
exec-once = ~/.config/hypr/workspace-manager.sh
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --watch cliphist store

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
  col.inactive_border = rgba(45475aaa)
  layout = dwindle
}

decoration {
  rounding = 10
  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = false
  }
  shadow {
    enabled = true
    range = 20
    render_power = 3
    color = rgba(1e1e2eee)
  }
  active_opacity = 1.0
  inactive_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.12
}

input {
  kb_layout = us
  follow_mouse = 0
  touchpad {
    natural_scroll = true
    tap-to-click = true
    disable_while_typing = true
  }
}

animations {
  enabled = true

  bezier = ease, 0.25, 0.1, 0.25, 1
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smooth, 0.5, 0, 0.99, 0.99

  animation = windows, 1, 6, overshot, slide
  animation = windowsOut, 1, 6, ease, slide
  animation = fade, 1, 6, smooth
  animation = workspaces, 1, 6, overshot, slide
  animation = border, 1, 10, default
  animation = borderangle, 0
}

dwindle {
  force_split = 2
  pseudotile = true
  smart_split = false
  preserve_split = true
  single_window_aspect_ratio = 16 9
}

misc {
  disable_hyprland_logo = true
  animate_manual_resizes = true
  vfr = true
  vrr = 1
}

render {
  direct_scanout = true
}

bind = $mod, Return, exec, ~/.config/hypr/open-terminal.sh
bind = $mod, Space, exec, walker
bind = $mod, P, exec, ~/.config/hypr/walker-bitwarden.sh
bind = $mod, B, exec, google-chrome-stable
bind = $mod, G, exec, google-chrome-stable --app=https://gemini.google.com
bind = $mod, M, exec, mattermost-desktop
bind = $mod, E, exec, thunar
bind = $mod, Escape, exec, pidof hyprlock || hyprlock
bind = $mod, C, exec, cliphist list | walker --dmenu | cliphist decode | wl-copy
bind = $mod, N, exec, pkill hyprsunset || hyprsunset -t 4000
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0
bind = $mod, V, exec, code --enable-features=UseOzonePlatform --ozone-platform=wayland --disable-gpu-compositing
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, left, layoutmsg, swapprev
bind = $mod, right, layoutmsg, swapnext
bind = $mod, up, layoutmsg, swapprev
bind = $mod, down, layoutmsg, swapnext
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1
bind = ALT, Tab, cyclenext
bind = ALT SHIFT, Tab, cyclenext, prev

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind = $mod, mouse_down, movetoworkspace, r+1
bind = $mod, mouse_up, movetoworkspace, r-1


bind = $mod, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot copied"

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +10%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

windowrulev2 = noborder, fullscreen:1

windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = float,class:^(blueman-manager)$
windowrulev2 = float,title:^(Open File)(.*)$
windowrulev2 = float,title:^(Save File)(.*)$
windowrulev2 = float,title:^(Save As)(.*)$
windowrulev2 = float,title:^(Confirm)(.*)$
windowrulev2 = float,title:^(File Upload)(.*)$
windowrulev2 = float,title:^(Picture-in-Picture)$
windowrulev2 = pin,title:^(Picture-in-Picture)$
windowrulev2 = size 480 270,title:^(Picture-in-Picture)$
windowrulev2 = move 100%-490 100%-280,title:^(Picture-in-Picture)$
windowrulev2 = float,class:^(Bitwarden)$
windowrulev2 = size 400 600,class:^(Bitwarden)$
windowrulev2 = float,class:^(thunar)$,title:^(File Operation Progress)$

# Resize submap
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , L, resizeactive, 40 0
binde = , K, resizeactive, 0 -40
binde = , J, resizeactive, 0 40
bind = , Escape, submap, reset
bind = , Return, submap, reset
submap = reset
