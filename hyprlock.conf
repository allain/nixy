background {
    monitor =
    color = rgb(1e1e2e)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgba(89b4faee)
    inner_color = rgba(1e1e2eee)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(cdd6f4ff)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(a6adc8ff)
    position = 0, 60
    halign = center
    valign = center
}
